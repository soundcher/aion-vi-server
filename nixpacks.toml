[phases.setup]
nixPkgs = ["python313", "pango", "cairo", "gdk-pixbuf", "libffi", "fontconfig", "freetype", "glib", "gobject-introspection", "harfbuzz"]

[phases.install]
cmds = ["pip install -r requirements.txt"]

[start]
cmd = "gunicorn server:app --bind 0.0.0.0:$PORT --workers 2 --threads 2 --timeout 120 --graceful-timeout 30 --log-level info"
